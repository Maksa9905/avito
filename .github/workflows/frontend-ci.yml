name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - 'avito.trainee/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'avito.trainee/**'
      - '.github/workflows/frontend-ci.yml'

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: avito.trainee

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: avito.trainee/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm run lint

      - name: Unit tests
        run: pnpm run test:run

      - name: Production build
        run: pnpm run build
